[project]
name = "cvxcla"
version = "1.6.2"
description = "Critical line algorithm for the efficient frontier"
readme = "README.md"
requires-python = ">=3.11"
# Private :: Do Not Upload (prevents rhiza_release.yml from publishing to PyPI)

dependencies = [
    "numpy>=2.0.0",
]

# add Philipp
authors = [{name = "Thomas Schmelzer", email = "thomas.schmelzer@gmail.com"},
           {name = "Philipp Schiele", email = "pschiele@stanford.edu"}]

[project.optional-dependencies]
plot = [
    "plotly>=6.0.1",
    "kaleido==1.2.0",
]

[project.urls]
repository = "https://github.com/cvxgrp/cvxcla"


[dependency-groups]
dev = [
    "loguru==0.7.3",
    "mosek==11.1.11",
    "marimo==0.23.4",
    "pandas==3.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cvxcla"]

[tool.deptry.per_rule_ignores]
DEP002 = ["kaleido"]

[tool.deptry.package_module_name_map]
numpy = "numpy"
plotly = "plotly"
kaleido = "kaleido"
loguru = "loguru"
mosek = "mosek"
marimo = "marimo"
pandas = "pandas"
